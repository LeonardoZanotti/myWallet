<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myWallet - Smart Portfolio Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        dark: {
                            bg: '#0f172a',
                            card: '#1e293b',
                            border: '#334155',
                            text: '#f8fafc',
                            muted: '#94a3b8'
                        },
                        brand: {
                            green: '#10b981',
                            greenHover: '#059669',
                            red: '#ef4444',
                            blue: '#3b82f6'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-bg text-dark-text font-sans antialiased min-h-screen">
    <!-- Global Loading Spinner -->
    <div id="global-loader" class="fixed inset-0 bg-dark-bg/80 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center transition-opacity duration-300">
        <i class="fa-solid fa-circle-notch fa-spin text-brand-green text-5xl mb-4"></i>
        <p class="text-lg font-medium text-white">Loading data...</p>
    </div>

    <!-- Navbar -->
    <nav class="border-b border-dark-border bg-dark-card sticky top-0 z-50 shadow-md">
        <div class="w-full max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <i class="fa-solid fa-wallet text-brand-green text-2xl mr-3"></i>
                    <span class="font-bold text-xl tracking-tight">myWallet</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="w-full max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">
        
        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="summary-card bg-dark-card p-6 rounded-2xl border border-dark-border shadow-lg">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-dark-muted text-sm font-medium mb-1">Total Patrimony</p>
                        <h3 class="text-2xl font-bold" id="total-patrimony">R$ 0,00</h3>
                    </div>
                    <div class="p-3 bg-brand-blue/10 rounded-xl text-brand-blue">
                        <i class="fa-solid fa-building-columns"></i>
                    </div>
                </div>
                <div class="mt-4 flex items-center text-sm">
                    <span id="total-variation" class="text-brand-green font-medium flex items-center">
                        <i class="fa-solid fa-arrow-trend-up mr-1"></i> 0.00%
                    </span>
                    <span class="text-dark-muted ml-2">overall return</span>
                </div>
            </div>
            
            <div class="summary-card bg-dark-card p-6 rounded-2xl border border-dark-border shadow-lg">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-dark-muted text-sm font-medium mb-1">Total Cost Basis</p>
                        <h3 class="text-2xl font-bold" id="total-cost">R$ 0,00</h3>
                    </div>
                    <div class="p-3 bg-brand-green/10 rounded-xl text-brand-green">
                        <i class="fa-solid fa-money-bill-wave"></i>
                    </div>
                </div>
            </div>

            <!-- Smart Buy Calculator -->
            <div class="col-span-1 lg:col-span-2 bg-dark-card p-6 rounded-2xl border border-dark-border shadow-lg bg-gradient-to-br from-dark-card to-[#1e293b]/80">
                <h3 class="text-lg font-bold mb-4 flex items-center">
                    <i class="fa-solid fa-calculator text-brand-blue mr-2"></i> Smart Buy Calculator
                </h3>
                <div class="flex space-x-4 items-end">
                    <div class="flex-1">
                        <label class="text-dark-muted text-xs font-medium mb-1 block">Invest BRL</label>
                        <input type="number" id="invest-brl" placeholder="0.00" class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-dark-text focus:outline-none focus:border-brand-blue transition-colors">
                    </div>
                    <div class="flex-1">
                        <label class="text-dark-muted text-xs font-medium mb-1 block">Invest USD</label>
                        <input type="number" id="invest-usd" placeholder="0.00" class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-dark-text focus:outline-none focus:border-brand-blue transition-colors">
                    </div>
                    <button onclick="calculateSmartBuy()" class="btn-primary bg-brand-blue hover:bg-blue-600 text-white font-medium py-2 px-6 rounded-lg transition-colors flex items-center">
                        <i class="fa-solid fa-bolt mr-2"></i> Calculate
                    </button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Main Content Area -->
            <div class="col-span-1 lg:col-span-2 space-y-8" id="asset-groups-container">
                <!-- Dynamic groups will be injected here -->
            </div>

            <!-- Sidebar -->
            <div class="space-y-8">
                <!-- Add New Asset -->
                <div class="bg-dark-card p-6 rounded-2xl border border-dark-border shadow-lg">
                    <h3 class="text-lg font-bold mb-4 flex items-center">
                        <i class="fa-solid fa-plus-circle text-brand-green mr-2"></i> Add Asset
                    </h3>
                    <form id="add-asset-form" class="space-y-4">
                        <div>
                            <label class="text-dark-muted text-xs font-medium mb-1 block">Ticker (e.g. VOO, BBOV11.SA)</label>
                            <input type="text" id="add-ticker" required class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-dark-text focus:border-brand-blue outline-none transition-colors">
                        </div>
                        <div class="flex space-x-4">
                            <div class="flex-1">
                                <label class="text-dark-muted text-xs font-medium mb-1 block">Quantity</label>
                                <input type="number" step="0.01" id="add-qty" required class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-dark-text focus:border-brand-blue outline-none transition-colors">
                            </div>
                            <div class="flex-1">
                                <label class="text-dark-muted text-xs font-medium mb-1 block">Avg Price</label>
                                <input type="number" step="0.01" id="add-price" required class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-dark-text focus:border-brand-blue outline-none transition-colors">
                            </div>
                        </div>
                        <div class="flex space-x-4">
                            <div class="flex-1">
                                <label class="text-dark-muted text-xs font-medium mb-1 block">Weight (Nota 0-100)</label>
                                <input type="number" id="add-nota" min="0" max="100" required class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-dark-text focus:border-brand-blue outline-none transition-colors">
                            </div>
                            <div class="flex-1">
                                <label class="text-dark-muted text-xs font-medium mb-1 block">Category</label>
                                <select id="add-tag" required class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-dark-text focus:border-brand-blue outline-none transition-colors">
                                    <option value="BR ETFs">BR ETFs</option>
                                    <option value="US ETFs">US ETFs</option>
                                    <option value="FII">FII</option>
                                    <option value="Ações">Ações</option>
                                    <option value="BDR">BDR</option>
                                    <option value="Stocks">Stocks</option>
                                    <option value="Crypto">Crypto</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-brand-green hover:bg-brand-greenHover text-white font-medium py-2 rounded-lg transition-colors flex items-center justify-center">
                            Save Asset
                        </button>
                    </form>
                </div>

                <!-- Chart -->
                <div class="bg-dark-card p-6 rounded-2xl border border-dark-border shadow-lg">
                    <h3 class="text-lg font-bold mb-4">Portfolio Distribution</h3>
                    <div class="relative h-64">
                        <canvas id="portfolioChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Modal for Smart Buy Recommendations -->
    <div id="recommendation-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center">
        <div class="bg-dark-card border border-dark-border rounded-2xl w-full max-w-3xl m-4 shadow-2xl overflow-hidden transform scale-95 opacity-0 transition-all duration-300" id="modal-content">
            <div class="px-6 py-4 border-b border-dark-border flex justify-between items-center bg-dark-bg/50">
                <h3 class="text-xl font-bold flex items-center"><i class="fa-solid fa-basket-shopping text-brand-green mr-2"></i> Smart Buy Plan</h3>
                <button onclick="closeModal()" class="text-dark-muted hover:text-white transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-dark-muted text-xs uppercase tracking-wider border-b border-dark-border">
                                <th class="pb-3 px-2">Asset</th>
                                <th class="pb-3 px-2">Tag</th>
                                <th class="pb-3 px-2">Current Value</th>
                                <th class="pb-3 px-2">Ideal %</th>
                                <th class="pb-3 px-2 text-brand-green">Value to Buy</th>
                                <th class="pb-3 px-2 text-brand-blue">Shares to Buy</th>
                            </tr>
                        </thead>
                        <tbody id="recommendation-body" class="text-sm divide-y divide-dark-border">
                            <!-- Injected -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Editing Asset -->
    <div id="edit-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden flex items-center justify-center">
        <div class="bg-dark-card border border-dark-border rounded-2xl w-full max-w-md m-4 shadow-2xl overflow-hidden transform scale-95 opacity-0 transition-all duration-300" id="edit-modal-content">
            <div class="px-6 py-4 border-b border-dark-border flex justify-between items-center bg-dark-bg/50">
                <h3 class="text-xl font-bold flex items-center"><i class="fa-solid fa-pen-to-square text-brand-blue mr-2"></i> Edit Asset <span id="edit-ticker-display" class="ml-2 text-dark-muted"></span></h3>
                <button onclick="closeEditModal()" class="text-dark-muted hover:text-white transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6">
                <form id="edit-asset-form" class="space-y-4">
                    <input type="hidden" id="edit-ticker">
                    <div class="flex space-x-4">
                        <div class="flex-1">
                            <label class="text-dark-muted text-xs font-medium mb-1 block">Quantity</label>
                            <input type="number" step="0.01" id="edit-qty" required class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-dark-text focus:border-brand-blue outline-none transition-colors">
                        </div>
                        <div class="flex-1">
                            <label class="text-dark-muted text-xs font-medium mb-1 block">Avg Price</label>
                            <input type="number" step="0.01" id="edit-price" required class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-dark-text focus:border-brand-blue outline-none transition-colors">
                        </div>
                    </div>
                    <div class="flex space-x-4">
                        <div class="flex-1">
                            <label class="text-dark-muted text-xs font-medium mb-1 block">Weight (Nota 0-100)</label>
                            <input type="number" id="edit-nota" min="0" max="100" required class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-dark-text focus:border-brand-blue outline-none transition-colors">
                        </div>
                        <div class="flex-1">
                            <label class="text-dark-muted text-xs font-medium mb-1 block">Category</label>
                            <select id="edit-tag" required class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-dark-text focus:border-brand-blue outline-none transition-colors">
                                <option value="BR ETFs">BR ETFs</option>
                                <option value="US ETFs">US ETFs</option>
                                <option value="FII">FII</option>
                                <option value="Ações">Ações</option>
                                <option value="BDR">BDR</option>
                                <option value="Stocks">Stocks</option>
                                <option value="Crypto">Crypto</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-brand-blue hover:bg-blue-600 text-white font-medium py-2 rounded-lg transition-colors flex items-center justify-center">
                        Save Changes
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
